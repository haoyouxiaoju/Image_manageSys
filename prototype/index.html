<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLIP-Image 素材库管理系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
    .app-layout { display: flex; flex-direction: column; height: 100vh; }
    .top-nav { display: flex; align-items: center; justify-content: space-between; height: 56px; padding: 0 20px; background: #1a1a2e; color: #fff; flex-shrink: 0; }
    .top-nav .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
    .top-nav .logo .dot { width: 10px; height: 10px; border-radius: 50%; background: #409EFF; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .top-nav .top-right { display: flex; align-items: center; gap: 14px; }
    .top-nav .search-input { width: 260px; }
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 200px; background: #f5f7fa; border-right: 1px solid #e4e7ed; padding: 16px 0; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar .el-menu { border-right: none; background: transparent; }
    .sidebar .sidebar-title { padding: 8px 20px; font-size: 12px; color: #909399; letter-spacing: 1px; margin-top: 8px; }
    .main-content { flex: 1; overflow-y: auto; padding: 24px; }

    .stat-cards { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat-card { flex: 1; background: #fff; border-radius: 8px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-card .icon-box { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .icon-blue { background: #ecf5ff; color: #409EFF; } .icon-green { background: #f0f9eb; color: #67C23A; } .icon-orange { background: #fdf6ec; color: #E6A23C; } .icon-purple { background: #f4f0fe; color: #7C3AED; }
    .stat-card .info .num { font-size: 24px; font-weight: 700; color: #303133; }
    .stat-card .info .label { font-size: 13px; color: #909399; margin-top: 2px; }

    .tag-filter { background: #fff; border-radius: 8px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .tag-filter .title { font-size: 14px; color: #606266; margin-bottom: 10px; font-weight: 500; }

    .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .asset-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: box-shadow 0.2s, transform 0.2s; position: relative; }
    .asset-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .asset-card .thumb { width: 100%; height: 160px; object-fit: cover; background: #e4e7ed; }
    .asset-card .card-info { padding: 12px 14px; }
    .asset-card .card-name { font-size: 14px; font-weight: 500; color: #303133; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .asset-card .card-meta { font-size: 12px; color: #909399; margin-top: 6px; display: flex; justify-content: space-between; }
    .asset-card .card-tags { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
    .asset-card .ai-badge { position: absolute; top: 8px; right: 8px; background: linear-gradient(135deg,#7C3AED,#409EFF); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; }

    /* 搜索页 */
    .search-hero { text-align: center; padding: 32px 0 20px; }
    .search-hero h2 { font-size: 22px; font-weight: 600; color: #303133; margin-bottom: 6px; }
    .search-hero .sub { color: #909399; font-size: 13px; margin-bottom: 20px; }
    .search-result-item { display: flex; gap: 16px; background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); align-items: center; }
    .search-result-item .result-thumb { width: 100px; height: 75px; object-fit: cover; border-radius: 6px; background: #e4e7ed; flex-shrink: 0; }
    .search-result-item .result-info { flex: 1; min-width: 0; }
    .result-name { font-size: 15px; font-weight: 500; color: #303133; }
    .result-desc { font-size: 13px; color: #909399; margin-top: 4px; }
    .match-reasons { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .score-badge { flex-shrink: 0; text-align: center; }
    .suggest-tags { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }

    /* 上传页 */
    .upload-zone { background: #fff; border-radius: 8px; padding: 48px; text-align: center; border: 2px dashed #dcdfe6; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .upload-zone:hover, .upload-zone.dragover { border-color: #7C3AED; background: #faf5ff; }
    .upload-zone .zone-icon { font-size: 52px; color: #c0c4cc; margin-bottom: 12px; }
    .upload-zone:hover .zone-icon { color: #7C3AED; }
    .upload-zone p { font-size: 15px; color: #606266; }
    .upload-zone .sub { font-size: 12px; color: #c0c4cc; margin-top: 6px; }
    .upload-preview-list { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .upload-preview-item { width: 130px; text-align: center; background: #fff; border-radius: 8px; padding: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .upload-preview-item img { width: 114px; height: 85px; object-fit: cover; border-radius: 6px; background: #e4e7ed; }
    .upload-preview-item .name { font-size: 12px; color: #606266; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upload-form { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

    /* CLIP 分析面板 */
    .clip-panel { background: linear-gradient(135deg, #faf5ff 0%, #ecf5ff 100%); border: 1px solid #e0d4f5; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .clip-panel .panel-title { font-size: 15px; font-weight: 600; color: #7C3AED; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .clip-features { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .clip-feature { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 6px; padding: 10px 14px; }
    .clip-feature .f-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .clip-feature .f-info .f-label { font-size: 12px; color: #909399; }
    .clip-feature .f-info .f-value { font-size: 14px; font-weight: 500; color: #303133; }
    .clip-feature .confidence { margin-left: auto; }

    /* 抽屉 */
    .drawer-image { width: 100%; border-radius: 8px; margin-bottom: 16px; }
    .meta-row { display: flex; gap: 20px; margin-bottom: 10px; font-size: 13px; }
    .meta-label { color: #909399; width: 60px; flex-shrink: 0; }
    .meta-value { color: #303133; }
    .version-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f5f7fa; border-radius: 6px; margin-bottom: 8px; }
    .version-item .v-tag { font-weight: 600; color: #409EFF; }
    .audit-table { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-top: 20px; }

    /* 维度说明卡 */
    .info-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
    .info-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .info-card h4 { font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .info-card p, .info-card ul { font-size: 13px; color: #606266; line-height: 1.8; }
    .info-card ul { padding-left: 16px; }

    /* AI thinking animation */
    .ai-thinking { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: #faf5ff; border-radius: 8px; margin: 12px 0; }
    .ai-thinking .dots { display: flex; gap: 4px; }
    .ai-thinking .dots span { width: 6px; height: 6px; border-radius: 50%; background: #7C3AED; animation: bounce 1.2s infinite; }
    .ai-thinking .dots span:nth-child(2) { animation-delay: .2s; }
    .ai-thinking .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
  </style>
</head>
<body>
<div id="app">
  <div class="app-layout">
    <!-- ===== 顶部导航 ===== -->
    <header class="top-nav">
      <div class="logo"><span class="dot"></span> CLIP-Image 素材库</div>
      <div class="top-right">
        <el-input v-model="globalSearch" class="search-input" placeholder="全局搜索素材..." :prefix-icon="Search" clearable size="small" />
        <el-select v-model="currentRole" size="small" style="width:130px" @change="onRoleChange">
          <el-option label="管理员" value="admin" />
          <el-option label="编辑" value="editor" />
          <el-option label="访客" value="guest" />
        </el-select>
        <el-tag :type="roleTagType" size="small" effect="dark">{{ roleLabel }}</el-tag>
        <span v-if="currentRole!=='guest'" style="font-size:11px;color:#a0aec0">已登录为管理员，拥有全部操作权限</span>
        <template v-if="currentRole === 'guest'">
          <el-button type="primary" size="small" plain @click="showLogin = true">登录</el-button>
        </template>
        <template v-else>
          <el-dropdown trigger="click">
            <span style="color:#fff;cursor:pointer;display:flex;align-items:center;gap:4px">
              <el-icon><UserFilled /></el-icon> {{ currentUser }} <el-icon><ArrowDown /></el-icon>
            </span>
            <template #dropdown>
              <el-dropdown-menu>
                <el-dropdown-item disabled>当前角色：{{ roleLabel }}</el-dropdown-item>
                <el-dropdown-item divided @click="onLogout">退出登录</el-dropdown-item>
              </el-dropdown-menu>
            </template>
          </el-dropdown>
        </template>
      </div>
    </header>

    <!-- ===== 主体 ===== -->
    <div class="main-layout">
      <aside class="sidebar">
        <el-menu :default-active="currentView" @select="onMenuSelect">
          <el-menu-item index="assets"><el-icon><PictureFilled /></el-icon><span>素材库</span></el-menu-item>
          <el-menu-item index="search"><el-icon><Search /></el-icon><span>以文搜图</span></el-menu-item>
          <el-menu-item index="upload" :disabled="currentRole==='guest'"><el-icon><UploadFilled /></el-icon><span>上传素材</span></el-menu-item>
        </el-menu>
        <div style="flex:1"></div>
        <div class="sidebar-title">AI 能力</div>
        <el-menu :default-active="currentView" @select="onMenuSelect">
          <el-menu-item index="clip-info"><el-icon><Cpu /></el-icon><span>CLIP 能力说明</span></el-menu-item>
        </el-menu>
        <template v-if="currentRole==='admin'">
          <div class="sidebar-title">管理</div>
          <el-menu :default-active="currentView" @select="onMenuSelect">
            <el-menu-item index="audit"><el-icon><Document /></el-icon><span>审计日志</span></el-menu-item>
          </el-menu>
        </template>
      </aside>

      <main class="main-content">

        <!-- ========== 素材库 ========== -->
        <template v-if="currentView==='assets'">
          <div class="stat-cards">
            <div class="stat-card"><div class="icon-box icon-blue"><el-icon><PictureFilled /></el-icon></div><div class="info"><div class="num">{{ filteredAssets.length }}</div><div class="label">素材总数</div></div></div>
            <div class="stat-card"><div class="icon-box icon-green"><el-icon><Plus /></el-icon></div><div class="info"><div class="num">{{ monthNewCount }}</div><div class="label">本月新增</div></div></div>
            <div class="stat-card"><div class="icon-box icon-orange"><el-icon><Collection /></el-icon></div><div class="info"><div class="num">{{ allTags.length }}</div><div class="label">标签数</div></div></div>
            <div class="stat-card"><div class="icon-box icon-purple"><el-icon><Cpu /></el-icon></div><div class="info"><div class="num">{{ clipReadyCount }}</div><div class="label">CLIP已索引</div></div></div>
          </div>

          <div class="tag-filter">
            <div class="title">标签筛选</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <el-tag v-for="t in allTags" :key="t" :type="selectedTags.includes(t)?'':'info'" :effect="selectedTags.includes(t)?'dark':'plain'" style="cursor:pointer" @click="toggleTag(t)">{{ t }}</el-tag>
            </div>
          </div>

          <div class="asset-grid">
            <div v-for="a in filteredAssets" :key="a.id" class="asset-card" @click="openDetail(a)">
              <img :src="a.thumb" :alt="a.name" class="thumb" loading="lazy">
              <span class="ai-badge" v-if="a.clipDesc">CLIP 已索引</span>
              <div class="card-info">
                <div class="card-name">{{ a.name }}</div>
                <div class="card-meta"><span>{{ a.author }}</span><span>{{ a.date }}</span></div>
                <div class="card-tags"><el-tag v-for="t in a.tags" :key="t" size="small">{{ t }}</el-tag></div>
              </div>
            </div>
          </div>
          <el-empty v-if="filteredAssets.length===0" description="没有匹配的素材" />
        </template>

        <!-- ========== 以文搜图 ========== -->
        <template v-if="currentView==='search'">
          <div class="search-hero">
            <h2>以文搜图 · Chinese-CLIP 语义检索</h2>
            <p class="sub">输入自然语言描述，AI 在 512 维语义空间中匹配最相似的图片</p>
            <el-input v-model="searchQuery" size="large" placeholder="例如：蓝色科技感背景图、年会大合影、白色产品展示图..." style="max-width:600px" clearable @keyup.enter="doSearch">
              <template #append><el-button type="primary" @click="doSearch" :loading="searching">搜索</el-button></template>
            </el-input>
            <div class="suggest-tags">
              <span style="font-size:12px;color:#c0c4cc">试试语义搜索：</span>
              <el-tag v-for="s in searchSuggestions" :key="s" type="info" plain size="small" style="cursor:pointer" @click="searchQuery=s;doSearch()">{{ s }}</el-tag>
            </div>
          </div>

          <!-- 搜索原理说明 -->
          <el-collapse v-if="searchResults.length===0 && !searchQuery" style="max-width:700px;margin:0 auto 20px">
            <el-collapse-item title="CLIP 语义搜索是如何工作的？" name="1">
              <div style="font-size:13px;color:#606266;line-height:2">
                <p><b>1. 图像入库时：</b>Chinese-CLIP 的图像编码器将每张图片映射为一个 <b>512 维向量</b>（embedding），存入 FAISS 向量索引。</p>
                <p><b>2. 搜索时：</b>你输入的中文文本经过 Chinese-CLIP 文本编码器，生成另一个 <b>512 维向量</b>。</p>
                <p><b>3. 匹配：</b>FAISS 计算文本向量与所有图像向量的<b>余弦相似度</b>，返回 Top-K 结果。</p>
                <p><b>4. 关键优势：</b>不再依赖文件名或标签的精确匹配，而是理解<b>语义</b>——"蓝色科技背景"能匹配到没有"蓝色"标签、但视觉是蓝色科技风的图片。</p>
              </div>
            </el-collapse-item>
          </el-collapse>

          <template v-if="searchResults.length>0">
            <div class="tag-filter" style="margin-top:16px">
              <span style="font-size:13px;color:#606266">检索到 {{ searchResults.length }} 条结果 &nbsp;|&nbsp; 余弦相似度排序 &nbsp;|&nbsp; 继续筛选标签：</span>
              <el-tag v-for="t in searchResultTags" :key="t" :type="searchActiveTags.includes(t)?'':'info'" :effect="searchActiveTags.includes(t)?'dark':'plain'" style="cursor:pointer;margin-left:6px" size="small" @click="toggleSearchTag(t)">{{ t }}</el-tag>
            </div>

            <div v-for="(r,i) in searchResultsFiltered" :key="r.id" class="search-result-item">
              <img :src="r.thumb" class="result-thumb">
              <div class="result-info">
                <div class="result-name">{{ i+1 }}. {{ r.name }}</div>
                <div class="result-desc">{{ r.desc }}</div>
                <div class="match-reasons">
                  <el-tag v-for="m in r.matchReasons" :key="m" size="small" type="success" effect="plain">{{ m }}</el-tag>
                </div>
              </div>
              <div class="score-badge">
                <el-progress type="dashboard" :percentage="r.score" :width="56" :stroke-width="6" :color="r.score>90?'#67C23A':r.score>80?'#409EFF':'#E6A23C'">
                  <template #default><span style="font-size:13px;font-weight:600">{{ r.score }}%</span></template>
                </el-progress>
                <div style="font-size:11px;color:#c0c4cc">余弦相似度</div>
              </div>
            </div>
          </template>
          <el-empty v-else-if="searchQuery && searchResults.length===0" description="未找到匹配的素材，试试换一种描述方式" />
        </template>

        <!-- ========== 上传素材（含 CLIP AI 分析） ========== -->
        <template v-if="currentView==='upload'">
          <el-alert v-if="currentRole==='guest'" title="访客模式下无法上传素材，请切换到编辑或管理员角色" type="warning" show-icon :closable="false" style="margin-bottom:20px" />

          <!-- 步骤引导 -->
          <div style="display:flex;gap:16px;margin-bottom:20px">
            <div style="flex:1;background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px">
              <span style="width:28px;height:28px;border-radius:50%;background:#7C3AED;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">1</span>
              <div><b style="font-size:14px;color:#303133">选择图片</b><div style="font-size:12px;color:#909399">点击或拖拽上传，支持批量</div></div>
            </div>
            <div style="flex:1;background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px;opacity:0.6">
              <span style="width:28px;height:28px;border-radius:50%;background:#c0c4cc;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">2</span>
              <div><b style="font-size:14px;color:#303133">CLIP AI 分析</b><div style="font-size:12px;color:#909399">自动识别物体、风格、色调</div></div>
            </div>
            <div style="flex:1;background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px;opacity:0.6">
              <span style="width:28px;height:28px;border-radius:50%;background:#c0c4cc;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">3</span>
              <div><b style="font-size:14px;color:#303133">确认入库</b><div style="font-size:12px;color:#909399">补充标签描述，存入FAISS索引</div></div>
            </div>
          </div>

          <!-- 上传区域 -->
          <div :class="['upload-zone',{dragover:dragOver}]" @click="triggerUpload" @dragover.prevent="dragOver=true" @dragleave="dragOver=false" @drop.prevent="onDrop">
            <div class="zone-icon"><el-icon><UploadFilled /></el-icon></div>
            <p style="font-size:16px;font-weight:600;color:#303133">点击或拖拽图片到此区域</p>
            <p class="sub">支持 JPG / PNG / WebP，单文件 ≤20MB · 批量上传 · 上传后自动触发 CLIP AI 分析</p>
            <input type="file" ref="fileInput" multiple accept="image/jpeg,image/png,image/webp" style="display:none" @change="onFileSelect">
          </div>

          <!-- 示例提示 -->
          <div v-if="uploadFiles.length===0" style="text-align:center;padding:12px">
            <span style="font-size:13px;color:#c0c4cc">还没有选择文件？试试选择一张咖啡、猫咪或风景照片，看看 CLIP 能分析出什么 🧠</span>
          </div>

          <!-- 文件预览列表 -->
          <div v-if="uploadFiles.length>0" class="upload-preview-list">
            <div v-for="(f,i) in uploadFiles" :key="i" class="upload-preview-item">
              <img :src="f.preview">
              <div class="name">{{ f.name }}</div>
              <el-tag :type="f.status==='done'?'success':f.status==='error'?'danger':f.status==='analyzing'?'':'warning'" size="small">
                {{ f.status==='done'?'完成':f.status==='error'?'失败':f.status==='analyzing'?'CLIP分析中...':'等待' }}
              </el-tag>
              <div style="margin-top:4px" v-if="f.status==='uploading'"><el-progress :percentage="f.progress" :stroke-width="4" /></div>
              <div style="margin-top:4px" v-if="f.status==='analyzing'"><el-progress :percentage="50" :stroke-width="4" :indeterminate="true" /></div>
            </div>
          </div>

          <!-- CLIP AI 分析结果面板 -->
          <div v-if="clipAnalysis" class="clip-panel">
            <div class="panel-title"><el-icon><Cpu /></el-icon> CLIP AI 分析结果</div>
            <div class="clip-features">
              <div class="clip-feature" v-for="f in clipAnalysis.features" :key="f.label">

              <p>CLIP（Contrastive Language-Image Pre-training）是一种<b>图文对比学习模型</b>。Chinese-CLIP 是其汉化版本，使用中文文本-图像对训练。</p>
              <p style="margin-top:8px">它不是"看图说话"模型，而是将图片和文本映射到<b>同一个 512 维语义空间</b>，通过向量距离衡量图文匹配程度。</p>

                <li>识别<b>场景类型</b>（室内/户外、办公室、展厅、草地...）</li>
                <li>捕捉<b>色彩倾向</b>（蓝色调、暖色调...）</li>
                <li>理解<b>抽象概念</b>（"适合年会用的"、"看起来很高级"）</li>
                <li>图文跨模态检索：用文字搜图、用图搜图</li>
              </ul>

                <li><b>精确计数</b>："图中有 3 只猫还是 5 只" — 容易出错</li>
                <li><b>细节属性</b>：具体色号、面料材质、产品型号</li>

              </ul>
              <p style="margin-top:8px;color:#909399;font-size:12px">注意："有没有猫"CLIP能做（物体识别✓），"有几只猫"CLIP做不好（计数✗）。</p>

              <h4><el-icon color="#67C23A"><Histogram /></el-icon> 描述粒度（真实能力边界）</h4>
              <p>CLIP 对图片的理解分三个层次，<b>物体识别处于"中粒度"，是强项</b>：</p>
              <ul style="margin-top:8px">
                <li><b>粗粒度（★★★）</b>：场景类型（室内/室外/天空）、媒介（照片/插画/设计稿/3D）、色调（暖/冷/暗/亮）</li>
                <li><b>中粒度（★★★）</b>：<b>主体对象识别（猫/狗/咖啡/汽车/建筑/人物）</b>、风格（科技风/自然风/商务风）、动作（奔跑/坐着/展示）</li>
                <li><b>细粒度（★☆☆）</b>：具体品牌/型号、精确数量（"3个人"）、空间关系（"左边的猫"）、图片中嵌入的文字内容</li>
              </ul>
              <p style="margin-top:8px;color:#7C3AED;font-size:12px"><b>结论：搜"咖啡"能找到咖啡图，搜"猫"能找到猫图 — 这属于CLIP的中粒度强项。</b>搜"拿铁拉花"或"橘猫在窗台上"更精准，因为语义组合+物体=更强的匹配信号。</p>
            </div>
            <div class="info-card">

      const styleOptions = ['商业摄影棚拍','UI设计稿','平面设计/海报','风光摄影','建筑摄影','数字合成图','室内摄影','航拍摄影','插画风格']
      const colorOptions = ['蓝色/冷色调','暖黄/橙色','白色/中性色','红色/金色','深色/暗色调','绿色/自然色','粉色/柔和色','高饱和度彩色']
      const tagPool = ['科技','蓝色','背景','UI','App','海报','产品','人物','风景','建筑','设计','摄影','室内','室外','商务','简约','现代','古典','自然','城市','电商','界面','移动端','网页','数据','品牌','创意','团队']
      const descTemplates = [
        '该图片呈现{style}特征，{color}为主视觉色调',
        '{style}图片，整体色调为{color}',
        '画面具有明显的{style}特点，色彩倾向为{color}',
      ]
      const style = styleOptions[Math.floor(Math.random()*styleOptions.length)]
      const color = colorOptions[Math.floor(Math.random()*colorOptions.length)]
      const suggestedTags = [...new Set([...tagPool.sort(()=>Math.random()-0.5).slice(0,4), uploadForm.value.tags[0] || '未分类'].filter(Boolean))]
      const desc = descTemplates[Math.floor(Math.random()*descTemplates.length)].replace('{style}',style).replace('{color}',color)
      clipAnalysis.value = {
        features: [
          { label:'视觉风格', value:style, conf:85+Math.floor(Math.random()*15), icon:'PictureFilled', bg:'#ecf5ff', color:'#409EFF' },
          { label:'主色调', value:color, conf:80+Math.floor(Math.random()*20), icon:'MagicStick', bg:'#fef0f0', color:'#F56C6C' },
          { label:'内容密度', value:['简洁','适中','丰富'][Math.floor(Math.random()*3)], conf:70+Math.floor(Math.random()*25), icon:'Grid', bg:'#f0f9eb', color:'#67C23A' },
          { label:'光线条件', value:['自然光','室内灯光','混合光','平光'][Math.floor(Math.random()*4)], conf:60+Math.floor(Math.random()*30), icon:'Sunny', bg:'#fdf6ec', color:'#E6A23C' },
        ],
        suggestedTags,
        semanticDesc: desc,
      }
      // 自动填充建议标签到表单
      suggestedTags.forEach(t => { if (!uploadForm.value.tags.includes(t) && t) uploadForm.value.tags.push(t) })
    }

    const startUploadWithCLIP = () => {
      uploading.value = true
      // 先进行 CLIP 分析
      uploadFiles.value.forEach(f => { if(f.status!=='done') f.status='analyzing' })
      setTimeout(() => {
        simulateCLIPAnalysis()
        // 再模拟上传
        uploadFiles.value.forEach(f => { if(f.status!=='done') f.status='uploading'; f.progress=0 })
        uploadFiles.value.forEach((f,i) => {
          if (f.status==='done') return
          const timer = setInterval(() => {
            f.progress += Math.floor(Math.random()*20)+10
            if (f.progress>=100) {
              f.progress=100; f.status='done'; clearInterval(timer)
              const newAsset = {
                id: Date.now()+i,
                name: f.name.replace(/\.[^.]+$/,''),
                desc: uploadForm.value.desc || clipAnalysis.value?.semanticDesc || f.name,
                thumb: f.preview,
                author: currentUser.value,
                date: new Date().toISOString().split('T')[0],
                tags: uploadForm.value.tags.length>0?[...uploadForm.value.tags]:['未分类'],
                source: uploadForm.value.source||'未知来源',
                size: (f.file.size/1024/1024).toFixed(1)+' MB',
                format: f.name.split('.').pop().toUpperCase(),
                clipDesc: clipAnalysis.value?.semanticDesc||'',
                clipStyle: clipAnalysis.value?.features[0]?.value||'',
                clipColor: clipAnalysis.value?.features[1]?.value||'',
                clipTags: clipAnalysis.value?.suggestedTags||[],
                versions: [{version:'v1.0',note:'CLIP 自动索引',date:new Date().toISOString().split('T')[0]}],
              }
              allMockAssets.value.unshift(newAsset)
              ElMessage.success(f.name+' 上传完成，CLIP 向量已索引')
            }
          }, 200+Math.random()*400)
        })
        uploading.value = false
      }, 1500)
    }

    return {
      currentView,currentRole,currentUser,showLogin,loginForm,
      globalSearch,selectedTags,allTags,
      detailVisible,detailAsset,showAddTag,newTag,tagSelect,
      searchQuery,searchResults,searching,searchActiveTags,searchSuggestions,
      dragOver,uploadFiles,fileInput,uploadForm,clipAnalysis,uploading,
      auditLogs,
      filteredAssets,monthNewCount,clipReadyCount,roleLabel,roleTagType,
      searchResultTags,searchResultsFiltered,
      onMenuSelect,onRoleChange,onLogout,doLogin,
      toggleTag,toggleSearchTag,toggleUploadTag,openDetail,removeTag,addTag,
      copyShareLink,deleteAsset,actionType,
      doSearch,triggerUpload,onFileSelect,onDrop,startUploadWithCLIP,
    }
  }
})

app.use(ElementPlus)
for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component) }
app.mount('#app')
</script>
</body>
</html>
