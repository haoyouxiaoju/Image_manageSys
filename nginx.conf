worker_processes 1;
error_log D:/myfiles/code/c/CLIP-Image_manageSys/logs/error.log warn;
events { worker_connections 1024; }

http {
    include       D:/download/nginx-1.28.3/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # temp 路径
    client_body_temp_path D:/myfiles/code/c/CLIP-Image_manageSys/temp/client_body_temp;
    proxy_temp_path       D:/myfiles/code/c/CLIP-Image_manageSys/temp/proxy_temp;
    fastcgi_temp_path     D:/myfiles/code/c/CLIP-Image_manageSys/temp/fastcgi_temp;
    uwsgi_temp_path       D:/myfiles/code/c/CLIP-Image_manageSys/temp/uwsgi_temp;
    scgi_temp_path        D:/myfiles/code/c/CLIP-Image_manageSys/temp/scgi_temp;

    # 上传文件大小限制
    client_max_body_size 20m;

    server {
        listen 80;
        server_name localhost;

        # 静态文件 — Nginx 直读磁盘
        location /files/ {
            alias D:/myfiles/code/c/CLIP-Image_manageSys/data/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # API 代理 — FastAPI
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 上传文件需要较大 body
            client_max_body_size 20m;
        }

        # 前端 — 开发模式代理 Vite
        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
